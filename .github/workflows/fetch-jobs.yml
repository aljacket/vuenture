name: Daily Job Fetch

on:
  schedule:
    # 07:00 UTC = 09:00 CET, Monday–Friday
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify claude CLI
        run: claude --version

      - name: Fetch & score jobs
        env:
          JSEARCH_KEY: ${{ secrets.JSEARCH_KEY }}
          INFOJOBS_CLIENT_ID: ${{ secrets.INFOJOBS_CLIENT_ID }}
          INFOJOBS_CLIENT_SECRET: ${{ secrets.INFOJOBS_CLIENT_SECRET }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          # Raw secret may contain trailing/embedded newlines from a sloppy
          # paste in the GitHub Secrets UI. The Claude CLI puts the token
          # straight into an Authorization header, and HTTP headers can't
          # contain \n — so we strip CR/LF before exporting.
          CLAUDE_CODE_OAUTH_TOKEN_RAW: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          export CLAUDE_CODE_OAUTH_TOKEN="$(printf '%s' "$CLAUDE_CODE_OAUTH_TOKEN_RAW" | tr -d '\r\n')"
          node scripts/fetchJobs.mjs

      - name: Commit jobs.json
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/jobs.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: daily job fetch $(date -u +%Y-%m-%d)"
          # Rebase on top of any commits that landed during the run before
          # pushing — prevents "rejected (fetch first)" when a human pushes
          # to main while the Action is scoring jobs.
          git pull --rebase origin main
          git push

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — the app is a single Vue view today, but this keeps
# deep links working if we add vue-router later.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed Vite assets (filenames include a content hash).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Always revalidate the jobs feed so a fresh daily commit is picked up
# immediately on the next page load.
[[headers]]
  for = "/jobs.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
